<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Books of AI Era</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f5f5f5; text-align: center; }
    .container { max-width: 600px; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #333; }

<body>
  <div class="container">
    <h1>Books of AI Era</h1>

    <a class="book" href="intelligence-age/en/">
      <strong>The Intelligence Age</strong><br>
      <span class="lang">🇬🇧 English</span>
    </a>
    <a class="book" href="intelligence-age/zh/">
      <strong>智能时代</strong><br>

    </a>

      <strong>The Crossroads: AI, Education, and the Next Generation</strong><br>
      <span class="lang">🇬🇧 English</span>

    <a class="book" href="crossroads/zh/">
